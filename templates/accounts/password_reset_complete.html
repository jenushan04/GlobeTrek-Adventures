{% extends 'base.html' %}
{% block title %}Password Reset Complete — GlobeTrek Adventures{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-card text-center">
        <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
        <h2 class="mt-3">Password Reset Successful</h2>
        <p class="text-muted">Your password has been changed. You can now log in with the new password.</p>
        <a href="{% url 'accounts:login' %}" class="btn btn-indigo mt-3"><i class="bi bi-box-arrow-in-right"></i> Log In</a>
    </div>
</div>
{% endblock %}
